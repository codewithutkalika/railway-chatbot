<!doctype html>
<html>
  <head>
    <title>Railway Chatbot</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)),
          url("https://www.timesbull.com/wp-content/uploads/2025/06/railways.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: white;
      }
      h2 {
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin-bottom: 20px;
      }
      #chat {
        width: 90%;
        max-width: 500px;
        height: 400px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px;
        padding: 20px;
        overflow-y: auto;
        margin-bottom: 20px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      #chat p {
        background: rgba(0, 0, 0, 0.4);
        padding: 10px 15px;
        border-radius: 10px;
        margin: 10px 0;
        line-height: 1.5;
        border-left: 4px solid #ff4500;
      }
      .controls {
        width: 90%;
        max-width: 500px;
        display: flex;
        gap: 10px;
      }
      input {
        flex: 1;
        padding: 12px;
        border-radius: 25px;
        border: none;
        outline: none;
        font-size: 16px;
      }
      button {
        background-color: #ff4500;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 25px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      button:hover {
        background-color: #e03e00;
        transform: scale(1.05);
      }
      #chat::-webkit-scrollbar {
        width: 5px;
      }
      #chat::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <h2>🚆 Railway Chatbot</h2>
    <div id="chat"></div>
    <div class="controls">
      <input id="msg" placeholder="Ask about trains or tickets..." />
      <button onclick="send()">Send</button>
    </div>
    <script>
      function send() {
        let msg = document.getElementById("msg").value;
        if (!msg) return;
        let chatDiv = document.getElementById("chat");
        chatDiv.innerHTML +=
          "<p style='border-left: 4px solid #00d2ff;'><b>You:</b> " +
          msg +
          "</p>";
        fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg }),
        })
          .then((res) => res.json())
          .then((data) => {
            chatDiv.innerHTML +=
              "<p><b>Bot:</b><br>" + data.reply.replace(/\n/g, "<br>") + "</p>";
            chatDiv.scrollTop = chatDiv.scrollHeight;
          });
        document.getElementById("msg").value = "";
      }
      document
        .getElementById("msg")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            send();
          }
        });
    </script>
  </body>
</html>
